name: Build RPM
on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install RPM tools
        run: sudo apt-get update && sudo apt-get install -y rpm gettext
      - name: Build RPM
        run: |
          PKG=fokuskompis
          VER=$(python3 -c "import re; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('src/fokuskompis/__init__.py').read()).group(1))")
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          tar czf ~/rpmbuild/SOURCES/$PKG-$VER.tar.gz --transform "s|^|$PKG-$VER/|" src/ po/ data/
          cat > ~/rpmbuild/SPECS/$PKG.spec << SPECEOF
          Name: $PKG
          Version: $VER
          Release: 1
          Summary: Focus & task manager for ADHD and autism
          License: GPL-3.0-or-later
          URL: https://www.autismappar.se
          Source0: %{name}-%{version}.tar.gz
          BuildArch: noarch
          Requires: python3, python3-gobject, gtk4, libadwaita

          %description
          GTK4/Adwaita focus manager with Pomodoro timer, step breakdown and thought parking.

          %prep
          %setup -q

          %install
          SITELIB=%{buildroot}/usr/lib/python3.14/site-packages
          mkdir -p \$SITELIB/$PKG
          cp src/$PKG/*.py \$SITELIB/$PKG/
          mkdir -p %{buildroot}/usr/bin
          cat > %{buildroot}/usr/bin/$PKG << 'LAUNCHER'
          #!/usr/bin/env python3
          from fokuskompis.main import main
          main()
          LAUNCHER
          chmod 755 %{buildroot}/usr/bin/$PKG
          mkdir -p %{buildroot}/usr/share/applications
          cp data/se.danielnylander.fokuskompis.desktop %{buildroot}/usr/share/applications/
          mkdir -p %{buildroot}/usr/share/icons/hicolor/scalable/apps
          cp data/icons/se.danielnylander.fokuskompis.svg %{buildroot}/usr/share/icons/hicolor/scalable/apps/ || true
          for po in po/*.po; do
            [ -f "\$po" ] || continue
            lang=\$(basename "\$po" .po)
            mkdir -p %{buildroot}/usr/share/locale/\$lang/LC_MESSAGES
            msgfmt "\$po" -o %{buildroot}/usr/share/locale/\$lang/LC_MESSAGES/$PKG.mo
          done

          %files
          /usr/bin/$PKG
          /usr/lib/python3.14/site-packages/$PKG/
          /usr/share/applications/se.danielnylander.fokuskompis.desktop
          /usr/share/icons/hicolor/scalable/apps/se.danielnylander.fokuskompis.svg
          /usr/share/locale/*/LC_MESSAGES/$PKG.mo
          SPECEOF
          sed -i 's/^          //' ~/rpmbuild/SPECS/$PKG.spec
          rpmbuild -bb ~/rpmbuild/SPECS/$PKG.spec || true
          find ~/rpmbuild/RPMS -name "*.rpm" -exec cp {} . \;
      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in *.rpm; do
            [ -f "$f" ] && gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
